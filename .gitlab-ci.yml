stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

default:
  image: node:20
  before_script:
    - npm ci

lint_job:
  stage: lint
  script:
    - npx eslint .

oxlint_job:
  stage: lint
  script:
    - npx oxlint .

biome_job:
  stage: lint
  script:
    - npx biome check .

format_job:
  stage: format
  script:
    - npx prettier --check .

type_check_job:
  stage: type_check
  script:
    - npm run typecheck

test_job:
  stage: test
  script:
    - npx vitest run

coverage_job:
  stage: coverage
  script:
    - npx vitest run --coverage

audit_job:
  stage: security
  script:
    - npm audit --audit-level=high

gitleaks_job:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --verbose --redact --no-git
