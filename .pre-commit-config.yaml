repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint .
        language: system
        files: \.(js|jsx)$
        pass_filenames: false

      - id: oxlint
        name: oxlint
        entry: npx oxlint .
        language: system
        files: \.(js|jsx|ts|tsx)$
        pass_filenames: false

      - id: biome
        name: biome
        entry: npx biome check .
        language: system
        files: \.(js|jsx|ts|tsx|json)$
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: npx prettier --check .
        language: system
        files: \.(js|jsx|json|css|md)$
        pass_filenames: false

      - id: typescript
        name: typescript type-check
        entry: npx tsc --noEmit
        language: system
        files: \.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: knip
        name: knip
        entry: npx knip
        language: system
        files: \.(js|jsx|json)$
        pass_filenames: false

      - id: npm-audit
        name: npm audit
        entry: npm audit --audit-level=high
        language: system
        files: package.json
        pass_filenames: false
